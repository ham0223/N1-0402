name: 24.10

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: N1/Immortalwrt/24.10/TL-feeds.conf.default
  CONFIG_FILE: N1/Immortalwrt/24.10/2025-0922-mini.config
  DIY_P1_SH: N1/Immortalwrt/24.10/diy-part1.sh
  DIY_P2_SH: N1/Immortalwrt/24.10/diy-part2.sh
  CUSTOM_FILES_DIR: N1/Immortalwrt/24.10/files
  LOG_PATH: N1/Immortalwrt/24.10/logs.txt
  TZ: Asia/Shanghai
  UPLOAD_RELEASE: 'true'
  DEBIAN_FRONTEND: noninteractive
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  VERSION_TAG: '24.10'

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: write

    steps:
    - name: 检查Actions
      uses: actions/checkout@v4

    - name: 创建编译空间挂载点
      run: |
        echo "::group::创建挂载点"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "挂载点创建完成：/workdir"
        echo "::endgroup::"

    - name: 最大化编译空间
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 10240
        swap-size-mb: 1024
        build-mount-path: /workdir
        overprovision-lvm: 'true'
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: 检查服务器配置
      run: |
        echo "::group::服务器配置信息"
        echo "警告⚠ 分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo "云编译建议取消勾选Node.js及其相关插件！"
        echo "已知CPU型号（降序）：8370C,8272CL,8171M,E5系列"
        echo "--- CPU ---"
        echo "CPU物理数量: $(cat /proc/cpuinfo | grep 'physical id' | sort | uniq | wc -l)"
        echo "CPU核心及版本: $(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c)"
        echo "--- 内存 ---"
        sudo lshw -short -C memory | grep GiB
        echo "--- 硬盘 ---"
        df -Th
        echo "::endgroup::"

    - name: 初始化编译环境
      run: |
        echo "::group::apt-get update"
        sudo -E apt-get -qq update || { echo "::error::apt-get update 失败"; exit 1; }
        echo "::endgroup::"

        echo "::group::apt-get install"
        sudo -E apt-get -qq install \
          ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk \
          gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool \
          libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
          libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool \
          libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip \
          p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig \
          texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd libfuse-dev \
          || { echo "::error::apt-get install 失败"; exit 1; }
        echo "::endgroup::"

        echo "::group::设置时区"
        sudo timedatectl set-timezone "$TZ"
        echo "时区已设置为：$TZ"
        echo "::endgroup::"

    - name: 克隆源码
      working-directory: /workdir
      run: |
        echo "::group::克隆 ImmortalWrt 源码"
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        echo "源码克隆完成，分支：$REPO_BRANCH"
        echo "::endgroup::"

    - name: 恢复 Ccache 缓存
      uses: actions/cache@v5
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ env.VERSION_TAG }}-${{ hashFiles(env.CONFIG_FILE) }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ env.VERSION_TAG }}-

    - name: 加载 DIY 1 与更新
      run: |
        echo "::group::复制 feeds.conf.default"
        [ -e $FEEDS_CONF ] && cp $FEEDS_CONF openwrt/feeds.conf.default && echo "已复制自定义 feeds 配置" || echo "未找到自定义 feeds 配置，使用默认"
        chmod +x $DIY_P1_SH
        cd openwrt && $GITHUB_WORKSPACE/$DIY_P1_SH
        echo "::endgroup::"

        echo "::group::feeds update & install"
        ./scripts/feeds update -a || { echo "::error::feeds update 失败"; exit 1; }
        ./scripts/feeds install -a || { echo "::error::feeds install 失败"; exit 1; }
        echo "::endgroup::"

    - name: 加载 DIY 2 与配置
      run: |
        echo "::group::复制自定义文件与配置"
        [ -e $CUSTOM_FILES_DIR ] && cp -r $CUSTOM_FILES_DIR openwrt/files && echo "已复制自定义 files 目录" || echo "未找到自定义 files 目录"
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config && echo "已复制 .config 配置文件" || echo "未找到配置文件"
        chmod +x $DIY_P2_SH
        cd openwrt && $GITHUB_WORKSPACE/$DIY_P2_SH
        echo "::endgroup::"

    - name: 下载软件包
      working-directory: /workdir/openwrt
      run: |
        echo "::group::make defconfig"
        make defconfig
        echo "::endgroup::"

        echo "::group::make download"
        make download -j8
        echo "::endgroup::"

        echo "::group::清理不完整下载包"
        find dl -size -1024c -exec rm -f {} \;
        echo "清理完成"
        echo "::endgroup::"

    - name: 编译固件
      id: compile
      working-directory: /workdir/openwrt
      run: |
        export PATH="/usr/lib/ccache:$PATH"
        export CCACHE_DIR="$HOME/.ccache"

        echo "::group::初始化 ccache"
        ccache -M 5G && ccache -z
        echo "::endgroup::"

        echo "::group::make 多线程编译"
        make -j$(nproc) || {
          echo "::endgroup::"
          echo "::warning::多线程编译失败，切换单线程并输出详细日志..."
          echo "::group::make 单线程编译（详细日志）"
          make -j1 V=s || { echo "::error::单线程编译也失败了"; exit 1; }
        }
        echo "::endgroup::"

        echo "status=success" >> $GITHUB_OUTPUT

    - name: 准备打包
      if: steps.compile.outputs.status == 'success'
      run: |
        echo "::group::整理编译产物"
        mkdir -p /workdir/upload openwrt-armvirt
        cp openwrt/bin/targets/*/*/*.tar.gz /workdir/upload/
        mv openwrt/bin/targets/*/*/*.tar.gz openwrt-armvirt/
        rm -rf /workdir/openwrt
        echo "打包准备完成"
        echo "::endgroup::"

    - name: 打包 N1 内核
      if: steps.compile.outputs.status == 'success'
      uses: unifreq/openwrt_packit@master
      env:
        WHOAMI: ham
        OPENWRT_ARMVIRT: openwrt-armvirt/*.tar.gz
        PACKAGE_SOC: s905d
        KERNEL_AUTO_LATEST: true
        KERNEL_REPO_URL: breakingbadboy/OpenWrt
        KERNEL_VERSION_NAME: 6.6.y

    - name: 整理发布信息
      id: release_info
      if: steps.compile.outputs.status == 'success'
      run: |
        echo "::group::生成 Release 描述文件"
        [ -d /opt/openwrt_packit/output ] && mv /opt/openwrt_packit/output/* /workdir/upload/
        DESC_FILE="/workdir/upload/release_description.txt"
        {
          echo "- **编译源码**：https://github.com/immortalwrt/immortalwrt/tree/openwrt-24.10"
          echo "- **网关地址**：192.168.123.2"
          echo "- **登录账户**：root"
          echo "- **登录密码**：password"
          echo ""
          echo "### 更新日志"
          if [ -f "${{ env.LOG_PATH }}" ]; then
            cat "${{ env.LOG_PATH }}"
          else
            echo "- 常规更新发布"
          fi
        } > $DESC_FILE
        echo "release_tag=N1-24.10_$(date +%Y%m%d)" >> $GITHUB_OUTPUT
        echo "release_date=$(date '+%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT
        echo "描述文件生成完成：$DESC_FILE"
        echo "::endgroup::"

    - name: 上传发布
      if: steps.compile.outputs.status == 'success'
      uses: ncipollo/release-action@v1
      with:
        name: "OpenWrt-N1 ${{ steps.release_info.outputs.release_date }}"
        tag: "${{ steps.release_info.outputs.release_tag }}"
        artifacts: /workdir/upload/openwrt*
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
        bodyFile: /workdir/upload/release_description.txt

    - name: 清理运行记录
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 3
        keep_minimum_runs: 5
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 清理旧版 Release
      if: env.UPLOAD_RELEASE == 'true'
      uses: dev-drprasad/delete-older-releases@master
      with:
        keep_latest: 7
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
